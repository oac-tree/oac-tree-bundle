name: Linux (Ubuntu LTS / gcc)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      EPICS_BASE: ${{ github.workspace }}/deps/epics-base
      PVXS_DIR: ${{ github.workspace }}/deps/pvxs
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Point submodules to latest develop
        run: git submodule foreach 'git fetch origin develop && git checkout develop && git reset --hard origin/develop'

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libxml2-dev \
            libgtest-dev libgmock-dev libevent-dev libasio-dev \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
            libqt6svg6-dev libqt6charts6-dev \
            libx11-xcb1 libxkbcommon-dev

      - name: Cache EPICS + PVXS
        id: epics-cache
        uses: actions/cache@v5
        with:
          path: deps
          key: epics-linux-base7-pvxs-${{ runner.os }}-v2

      - name: Build EPICS base + PVXS
        if: steps.epics-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p deps && cd deps
          git clone --depth 1 https://github.com/epics-base/epics-base.git
          make -C epics-base -j$(nproc)
          git clone --depth 1 https://github.com/mdavidsaver/pvxs.git
          echo "EPICS_BASE=$EPICS_BASE" > pvxs/configure/RELEASE.local
          make -C pvxs -j$(nproc)

      - name: Configure & build bundle
        run: |
          export EPICS_HOST_ARCH=$(${EPICS_BASE}/startup/EpicsHostArch)
          export PATH="$EPICS_BASE/bin/$EPICS_HOST_ARCH:$PVXS_DIR/bin/$EPICS_HOST_ARCH:$PATH"
          export LD_LIBRARY_PATH="$EPICS_BASE/lib/$EPICS_HOST_ARCH:$PVXS_DIR/lib/$EPICS_HOST_ARCH:$LD_LIBRARY_PATH"
          # EXCEPTION: Keep linked plugin libraries so their self-registration runs (Ubuntu's default --as-needed would otherwise drop them).
          export LDFLAGS="-Wl,--no-as-needed${LDFLAGS:+ $LDFLAGS}"
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/install ..
          make -j$(nproc)

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
          # EXCEPTION: EPICS CA/PVA discovery defaults to UDP broadcast, which
          # CI runners block; pin to loopback so in-process IOC tests can connect.
          EPICS_CA_AUTO_ADDR_LIST: "NO"
          EPICS_CA_ADDR_LIST: "127.0.0.1"
          EPICS_PVA_AUTO_ADDR_LIST: "NO"
          EPICS_PVA_ADDR_LIST: "127.0.0.1"
        run: |
          export EPICS_HOST_ARCH=$(${EPICS_BASE}/startup/EpicsHostArch)
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/install/lib:$GITHUB_WORKSPACE/install/lib64:$GITHUB_WORKSPACE/install/lib/oac-tree/plugins:$EPICS_BASE/lib/$EPICS_HOST_ARCH:$PVXS_DIR/lib/$EPICS_HOST_ARCH:$LD_LIBRARY_PATH"
          source "$GITHUB_WORKSPACE/install/bin/oac-tree-path.sh" 2>/dev/null || true
          # EXCEPTION: Skip tests that can't run in the CI sandbox (EPICS CA/PVA networking, soft-IOC, offscreen-Qt crashes, CopyToProcedureTest relative-path temp file).
          exclude='ChannelAccess|PvAccess|PVAccessServer|EPICSProtocolFactory|SoftIoc|Softioc|ClientServerStack|RemoteScenario|ChartViewTest|CopyToProcedureTest|CopyFromProcedureTest'
          rc=0
          for d in build/*-prefix/src/*-build; do
            echo "::group::ctest $d"
            ctest --test-dir "$d" --output-on-failure --no-tests=ignore -E "$exclude" -j"$(nproc)" || rc=1
            echo "::endgroup::"
          done
          exit $rc
